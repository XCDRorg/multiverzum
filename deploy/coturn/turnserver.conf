# coturn — TURN/STUN for Third Room WebRTC data channels (multiversum.cloud)
# Replace the IP and secret placeholders before running.

listening-port=3478
tls-listening-port=5349

# The server's PUBLIC IP — coturn advertises this for relay candidates.
external-ip=CHANGE_ME_server_public_ip

# Auth: shared-secret (time-limited credentials), matches MAS/Synapse config.
use-auth-secret
static-auth-secret=CHANGE_ME_turn_shared_secret
realm=multiversum.cloud

# UDP relay port range — these must be open in the firewall.
min-port=49152
max-port=65535

# Hardening
no-tcp-relay
no-multicast-peers
# Deny relaying to internal/loopback ranges (prevents SSRF via TURN):
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255

# TLS certs (optional but recommended — point at Caddy's or a copied cert):
# cert=/etc/coturn/turn.crt
# pkey=/etc/coturn/turn.key

fingerprint
stale-nonce
no-cli
